<svg width="1040" height="420" viewBox="0 0 1040 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Advanced Tool Use benchmark comparison table</title>
  <desc id="desc">Academic-style comparison table showing Advanced Tool Use versus a standard MCP loop across turns, input tokens, output tokens, peak context, and session cost.</desc>
  <rect width="1040" height="420" fill="#FFFFFF"/>

  <style>
    .title { font: 700 24px Georgia, "Times New Roman", serif; fill: #111827; }
    .subtitle { font: 400 14px Georgia, "Times New Roman", serif; fill: #4B5563; }
    .head { font: 700 15px Georgia, "Times New Roman", serif; fill: #111827; }
    .cell { font: 400 15px Georgia, "Times New Roman", serif; fill: #1F2937; }
    .num { font: 400 15px Georgia, "Times New Roman", serif; fill: #111827; }
    .improve { font: 700 15px Georgia, "Times New Roman", serif; fill: #0F766E; }
    .note { font: 400 12px Georgia, "Times New Roman", serif; fill: #6B7280; }
  </style>

  <text x="52" y="48" class="title">Benchmark comparison</text>
  <text x="52" y="74" class="subtitle">Multi-step Databricks task: list catalogs, count tables per schema in parallel, print top 5</text>

  <line x1="52" y1="104" x2="988" y2="104" stroke="#111827" stroke-width="1.5"/>
  <line x1="52" y1="150" x2="988" y2="150" stroke="#111827" stroke-width="1"/>
  <line x1="52" y1="342" x2="988" y2="342" stroke="#111827" stroke-width="1.5"/>

  <rect x="52" y="105" width="936" height="45" fill="#F8FAFC"/>

  <text x="70" y="133" class="head">Metric</text>
  <text x="500" y="133" text-anchor="end" class="head">Advanced Tool Use</text>
  <text x="705" y="133" text-anchor="end" class="head">Standard MCP loop</text>
  <text x="940" y="133" text-anchor="end" class="head">Improvement</text>

  <line x1="52" y1="188" x2="988" y2="188" stroke="#E5E7EB"/>
  <line x1="52" y1="226" x2="988" y2="226" stroke="#E5E7EB"/>
  <line x1="52" y1="264" x2="988" y2="264" stroke="#E5E7EB"/>
  <line x1="52" y1="302" x2="988" y2="302" stroke="#E5E7EB"/>

  <line x1="330" y1="104" x2="330" y2="342" stroke="#E5E7EB"/>
  <line x1="540" y1="104" x2="540" y2="342" stroke="#E5E7EB"/>
  <line x1="746" y1="104" x2="746" y2="342" stroke="#E5E7EB"/>

  <text x="70" y="175" class="cell">Session turns</text>
  <text x="500" y="175" text-anchor="end" class="num">3</text>
  <text x="705" y="175" text-anchor="end" class="num">17</text>
  <text x="940" y="175" text-anchor="end" class="improve">82% fewer</text>

  <text x="70" y="213" class="cell">Cumulative input tokens</text>
  <text x="500" y="213" text-anchor="end" class="num">7,672</text>
  <text x="705" y="213" text-anchor="end" class="num">826,570</text>
  <text x="940" y="213" text-anchor="end" class="improve">107x less</text>

  <text x="70" y="251" class="cell">Cumulative output tokens</text>
  <text x="500" y="251" text-anchor="end" class="num">744</text>
  <text x="705" y="251" text-anchor="end" class="num">8,095</text>
  <text x="940" y="251" text-anchor="end" class="improve">10.8x less</text>

  <text x="70" y="289" class="cell">Peak context window</text>
  <text x="500" y="289" text-anchor="end" class="num">3,394</text>
  <text x="705" y="289" text-anchor="end" class="num">100,679</text>
  <text x="940" y="289" text-anchor="end" class="improve">97% smaller</text>

  <text x="70" y="327" class="cell">Session cost</text>
  <text x="500" y="327" text-anchor="end" class="num">$0.000678</text>
  <text x="705" y="327" text-anchor="end" class="num">$0.017683</text>
  <text x="940" y="327" text-anchor="end" class="improve">96% cheaper</text>

  <text x="52" y="374" class="note">Note: single workload; gains scale with the number of tool calls and size of intermediate results.</text>
  <text x="52" y="394" class="note">Advanced Tool Use keeps intermediate tool results out of chat context by running orchestration inside the tool.</text>
</svg>
